paths:
  data_path: "./geom" #Path to the geom dataset
  clustering_subsets_path: "./clustering_subsets" #Path to save the clustering subsets"
  models_path: "./clustering_models" #Path to the clustering models
  conflow_output_path: "./geom/processed"
clustering:
  cutoff: 4.0 #Cutoff radius for SOAP descriptor"
  n_max: 4 #Maximum number of neighbors for SOAP descriptor
  l_max: 2 #Maximum angular momentum for SOAP descriptor
  max_atoms: 100000 #Maximum number of atoms per avhs combination
  min_atoms: 50 #Minimum number of atoms per avhs combination to perform clustering, if less, only one cluster is considered
  num_gap_replicas: 10 #Number of clustering replicas for computing the gap statistics 
  upper_cluster_limit: 30 #Upper limit for the number of clusters
  optimalk_n_jobs: 64 #Number of parallel jobs for the OptimalK computation
  optimalK_parallel_backend: "joblib" #Parallel backend for the OptimalK computation
  optimalK_random_state: 42 #Random state for the OptimalK computation
  kMeans_n_init: 10 #Number of initializations for the kMeans clustering
  kMeans_random_state: 42 #Random state for the kMeans clustering
partition: "drugs" #Dataset to use (qm9 or drugs)
